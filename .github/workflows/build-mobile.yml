name: Build Mobile Apps (Android & iOS)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'App version'
        required: true
        default: '1.0.0'

jobs:
  # 🤖 JOB 1: Build Android Application
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set Executable Permissions for Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Build Debug APK via Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # 🍎 JOB 2: Build iOS Application (runs on macOS)
  build-ios:
    name: Build iOS Project
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods Dependencies
        run: |
          cd ios/App
          pod install

      - name: Compile Xcode Simulator Build (No Code Signing Required)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     CODE_SIGNING_ALLOWED=NO \
                     clean build

      - name: Compress iOS App Bundle
        run: |
          cd ios/App/build/Release-iphonesimulator
          zip -r TienHiepAI_Simulator.zip App.app || echo "Skipping zip, build location might differ"

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-ios-simulator-app
          path: ios/App/build/Release-iphonesimulator/TienHiepAI_Simulator.zip
          if-no-files-found: warn
          retention-days: 7
