name: Build iOS Mobile App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'App version'
        required: true
        default: '1.0.0'

jobs:
  # 🍎 JOB: Build iOS Application (runs on macOS)
  build-ios:
    name: Build iOS Project
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods Dependencies
        run: |
          cd ios/App
          pod install

      - name: Compile Xcode Simulator Build (No Code Signing Required)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     clean build

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-ios-simulator-app
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 7
