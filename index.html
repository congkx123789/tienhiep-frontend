    <script>
      // Automatically handle Vite dynamic chunk load errors by doing a hard reload
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.indexOf('Failed to fetch dynamically imported module') !== -1 || e.message.indexOf('chunk') !== -1)) {
          console.warn('Chunk load error detected, reloading page to fetch latest version...', e);
          const lastReload = localStorage.getItem('last_chunk_reload');
          const now = Date.now();
          if (!lastReload || now - parseInt(lastReload, 10) > 10000) {
            localStorage.setItem('last_chunk_reload', now.toString());
            window.location.reload();
          }
        }
      }, true);
      
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && (e.reason.message.indexOf('Failed to fetch dynamically imported module') !== -1 || e.reason.message.indexOf('chunk') !== -1)) {
          console.warn('Unhandled promise rejection (chunk error), reloading page...', e);
          const lastReload = localStorage.getItem('last_chunk_reload');
          const now = Date.now();
          if (!lastReload || now - parseInt(lastReload, 10) > 10000) {
            localStorage.setItem('last_chunk_reload', now.toString());
            window.location.reload();
          }
        }
      });
    </script>
